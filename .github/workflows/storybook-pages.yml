name: Deploy Storybook to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        shell: bash
        run: |
          npm config set fetch-retries 5
          npm config set fetch-retry-factor 2
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000

          for attempt in 1 2 3; do
            npm ci && break
            if [ "$attempt" -eq 3 ]; then
              echo "npm ci failed after 3 attempts"
              exit 1
            fi
            echo "npm ci failed (attempt $attempt). Retrying in 15s..."
            sleep 15
          done

      - name: Heal optional dependencies in Storybook workspace
        shell: bash
        run: |
          # Workaround for npm optional-dependency bug in CI runners.
          npm install --no-save --workspace=storybook --include=optional

      - name: Ensure Linux native bindings
        shell: bash
        run: |
          missing=()

          node -e "require.resolve('@oxc-parser/binding-linux-x64-gnu')" >/dev/null 2>&1 || missing+=("@oxc-parser/binding-linux-x64-gnu")
          node -e "require.resolve('@oxc-resolver/binding-linux-x64-gnu')" >/dev/null 2>&1 || missing+=("@oxc-resolver/binding-linux-x64-gnu")
          node -e "require.resolve('@rolldown/binding-linux-x64-gnu')" >/dev/null 2>&1 || missing+=("@rolldown/binding-linux-x64-gnu")
          node -e "require.resolve('lightningcss-linux-x64-gnu')" >/dev/null 2>&1 || missing+=("lightningcss-linux-x64-gnu")

          if [ ${#missing[@]} -gt 0 ]; then
            echo "Missing bindings: ${missing[*]}"
            npm install --no-save --workspace=storybook \
              @oxc-parser/binding-linux-x64-gnu@0.127.0 \
              @oxc-resolver/binding-linux-x64-gnu@11.19.1 \
              @rolldown/binding-linux-x64-gnu@1.0.2 \
              lightningcss-linux-x64-gnu@1.32.0
          fi

      - name: Build Storybook
        run: npm run build-storybook --workspace=storybook

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: apps/storybook/storybook-static

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5